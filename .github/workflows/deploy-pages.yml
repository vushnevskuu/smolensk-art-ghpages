name: Deploy GitHub Pages

on:
  push:
    branches: ["master", "main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install and static build
        run: npm ci && npm run build
        env:
          STATIC_EXPORT: "1"
          PAGES_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_VERSION: ${{ github.sha }}
          NEXT_PUBLIC_APPWRITE_ENDPOINT: ${{ vars.NEXT_PUBLIC_APPWRITE_ENDPOINT }}
          NEXT_PUBLIC_APPWRITE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_ID }}
          NEXT_PUBLIC_APPWRITE_DATABASE_ID: smolensk-art
          NEXT_PUBLIC_APPWRITE_PROFILES_TABLE_ID: profiles
          NEXT_PUBLIC_APPWRITE_POSTS_TABLE_ID: posts
          NEXT_PUBLIC_APPWRITE_MEDIA_TABLE_ID: post-media
          NEXT_PUBLIC_APPWRITE_BUCKET_ID: post-media

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - id: deployment
        uses: actions/deploy-pages@v4
