<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Смоленск Арт - архив</title>
  <meta name="description" content="Исследования, статьи и материалы сообщества Смоленск Арт">
  <link rel="icon" href="smolensk-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://use.typekit.net/pkr7jzl.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #090909;
      --text: #efede7;
      --muted: #9b9891;
      --faint: #5f5d58;
      --line: rgba(255, 255, 255, 0.15);
      --panel: rgba(13, 13, 13, 0.94);
      --header-height: 80px;
      --footer-height: 82px;
      --index-font-scale: 1;
      --index-heading-size: 24px;
      --index-meta-size: clamp(13px, 1.15vw, 18px);
      --article-font-scale: 1;
      --article-body-size: 24px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    html { background: var(--bg); }
    body {
      min-height: 100dvh;
      overflow: hidden;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 14% 7%, rgba(255, 255, 255, 0.035), transparent 30%),
        radial-gradient(circle at 83% 68%, rgba(255, 255, 255, 0.018), transparent 38%),
        linear-gradient(112deg, rgba(255, 255, 255, 0.012), transparent 38%, rgba(0, 0, 0, 0.18));
      color: var(--text);
      font-family: "omnes-cyrillic", sans-serif;
      font-weight: 500;
      font-style: normal;
      transition: background-color 400ms ease, color 400ms ease;
    }

    body::before {
      content: "";
      position: fixed;
      z-index: 1;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='paper'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.72' numOctaves='4' seed='8' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23paper)' opacity='.42'/%3E%3C/svg%3E");
      background-size: 220px 220px;
      mix-blend-mode: soft-light;
      opacity: 0.18;
    }

    body.paper-beige {
      --bg: #e8e2d8;
      --text: #151515;
      --muted: #6e6a67;
      --faint: #9d9996;
      --line: rgba(21, 21, 21, 0.16);
      --panel: rgba(232, 226, 216, 0.94);
      background-image:
        radial-gradient(circle at 14% 7%, rgba(255, 255, 255, 0.22), transparent 30%),
        linear-gradient(112deg, rgba(255, 255, 255, 0.08), transparent 38%, rgba(45, 37, 29, 0.05));
    }

    body.theme-dark {
      --bg: #080808;
      --text: #a8a8a8;
      --muted: #565656;
      --faint: #353535;
      --line: rgba(255, 255, 255, 0.13);
      --panel: rgba(8, 8, 8, 0.94);
    }

    body.theme-rain {
      --bg: #9aa4b0;
      --text: #151515;
      --muted: #59616a;
      --faint: #77808a;
      --line: rgba(21, 21, 21, 0.18);
      --panel: rgba(154, 164, 176, 0.94);
      background-image: none;
    }

    button, input { font: inherit; color: inherit; }
    button { border: 0; background: none; cursor: pointer; }
    button:focus-visible, a:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 4px;
    }
    a { color: inherit; text-decoration-thickness: 1px; text-underline-offset: 3px; }

    .site-header {
      position: fixed;
      z-index: 30;
      inset: 0 0 auto;
      height: var(--header-height);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: clamp(22px, 4vw, 64px);
      padding: 18px 32px;
      pointer-events: none;
      background: transparent;
    }

    .header-logo {
      grid-column: 2;
      justify-self: center;
      pointer-events: auto;
    }
    .brand-logo {
      display: block;
      width: 64px;
      height: auto;
      filter: invert(1) grayscale(1);
      opacity: 0.9;
    }
    body.paper-beige .brand-logo { filter: none; }
    .header-search {
      justify-self: start;
      min-width: 0;
      width: 100%;
      max-width: min(100%, 420px);
      pointer-events: auto;
    }
    .index-search {
      position: fixed;
      z-index: 31;
      top: 0;
      left: 32px;
      display: flex;
      align-items: center;
      height: var(--header-height);
      width: min(100%, 420px);
      max-width: min(420px, calc(50vw - 48px));
      pointer-events: auto;
    }
    .header-search-wrap {
      position: relative;
      display: block;
    }
    .header-search-wrap.has-value .header-search-input {
      padding-right: clamp(24px, 2.5vw, 34px);
    }
    .header-search-input {
      width: 100%;
      padding: 0;
      border: 0;
      border-radius: 0;
      outline: 0;
      background: transparent;
      color: var(--muted);
      font-size: calc(var(--index-heading-size) * var(--index-font-scale));
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: -0.035em;
      opacity: 0.67;
      transition: color 180ms ease, opacity 180ms ease;
    }
    .header-search-input:focus,
    .header-search-wrap.has-value .header-search-input {
      color: var(--text);
      opacity: 1;
    }
    .header-search-input::placeholder { color: inherit; opacity: 1; }
    .header-search-clear {
      position: absolute;
      top: 50%;
      right: 0;
      width: clamp(18px, 2vw, 24px);
      height: clamp(18px, 2vw, 24px);
      color: var(--muted);
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 500;
      line-height: 1;
      opacity: 0.67;
      transform: translateY(-50%);
      transition: color 180ms ease, opacity 180ms ease, transform 180ms var(--ease);
    }
    .header-search-clear:hover { color: var(--text); opacity: 1; }
    .header-search-clear:active { transform: translateY(-50%) scale(0.94); }
    .header-actions {
      grid-column: 3;
      justify-self: end;
      display: flex;
      align-items: center;
      gap: clamp(14px, 2.4vw, 28px);
      pointer-events: auto;
    }
    .header-link {
      color: var(--muted);
      font-size: calc(var(--index-heading-size) * var(--index-font-scale));
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: -0.035em;
      opacity: 0.67;
      text-decoration: none;
      white-space: nowrap;
      transition: color 180ms ease, opacity 180ms ease, transform 180ms var(--ease);
    }
    .header-link:hover,
    .header-link[aria-expanded="true"] {
      color: var(--text);
      opacity: 1;
    }
    .header-link:active { transform: scale(0.98); }

    .settings-panel {
      position: fixed;
      z-index: 40;
      top: calc(var(--header-height) - 6px);
      right: 32px;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      transform-origin: top right;
      transition: opacity 200ms var(--ease), transform 220ms var(--ease);
    }
    .settings-panel[hidden] {
      display: block;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-6px) scale(0.98);
    }
    .settings-panel:not([hidden]) {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }
    .settings-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid color-mix(in srgb, var(--text) 14%, transparent);
      border-radius: 999px;
      background:
        linear-gradient(
          135deg,
          color-mix(in srgb, var(--text) 10%, transparent),
          color-mix(in srgb, var(--text) 4%, transparent)
        );
      backdrop-filter: blur(22px) saturate(1.35);
      -webkit-backdrop-filter: blur(22px) saturate(1.35);
      box-shadow:
        0 10px 34px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 color-mix(in srgb, var(--text) 16%, transparent);
    }
    .settings-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .settings-divider {
      width: 1px;
      height: 24px;
      background: color-mix(in srgb, var(--text) 14%, transparent);
      flex-shrink: 0;
    }
    .settings-chip {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      padding: 0;
      border: 1px solid transparent;
      border-radius: 999px;
      color: color-mix(in srgb, var(--text) 72%, transparent);
      transition:
        color 180ms ease,
        background 180ms ease,
        border-color 180ms ease,
        transform 180ms var(--ease),
        box-shadow 180ms ease;
    }
    .settings-chip[hidden],
    .settings-chip.is-unavailable {
      display: none !important;
    }
    .settings-chip svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .settings-chip:hover {
      color: var(--text);
      background: color-mix(in srgb, var(--text) 10%, transparent);
      border-color: color-mix(in srgb, var(--text) 10%, transparent);
    }
    .settings-chip[aria-pressed="true"] {
      color: var(--text);
      background: color-mix(in srgb, var(--text) 14%, transparent);
      border-color: color-mix(in srgb, var(--text) 22%, transparent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--text) 8%, transparent);
    }
    .settings-chip:active { transform: scale(0.94); }
    .paper-swatch {
      display: block;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid color-mix(in srgb, var(--text) 18%, transparent);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }
    .paper-swatch--dark { background: #090909; }
    .paper-swatch--warm { background: #f2ede4; }
    .settings-chip.paper-option[aria-pressed="true"] .paper-swatch {
      border-color: color-mix(in srgb, var(--text) 55%, transparent);
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--text) 35%, transparent),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .archive-layout {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      height: 100dvh;
    }

    .article-index,
    .article-view {
      min-width: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: none;
    }
    .article-index::-webkit-scrollbar,
    .article-view::-webkit-scrollbar { display: none; }

    .article-index {
      padding: calc(var(--header-height) + 25px) 32px 180px;
    }
    .index-list { list-style: none; }
    .index-item + .index-item { margin-top: 43px; }
    .index-button {
      display: block;
      width: 100%;
      text-align: left;
    }
    .index-date {
      display: block;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: calc(var(--index-meta-size) * var(--index-font-scale));
      font-variant-numeric: tabular-nums;
      opacity: 0.67;
      transition: color 180ms ease, opacity 180ms ease;
    }
    .index-title {
      display: block;
      padding-left: clamp(22px, 5vw, 52px);
      color: var(--muted);
      font-size: calc(var(--index-heading-size) * var(--index-font-scale));
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: -0.035em;
      overflow-wrap: anywhere;
      opacity: 0.67;
      transition: color 180ms ease, opacity 180ms ease;
    }
    .index-button:hover .index-title,
    .index-button:hover .index-date {
      color: var(--text);
      opacity: 1;
    }

    .article-view { padding: calc(var(--header-height) + 28px) 40px 180px; }
    .article-shell {
      width: min(100%, 980px);
      margin: 0 auto;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 220ms ease, transform 320ms var(--ease);
    }
    .article-shell.is-changing {
      opacity: 0;
      transform: translateY(10px);
    }
    .article-back {
      display: none;
      margin-bottom: 28px;
      color: var(--muted);
      font-size: 13px;
    }
    .article-empty {
      max-width: 420px;
      padding-top: 14vh;
      color: var(--muted);
      font-size: clamp(22px, 3vw, 42px);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }
    .article-block + .article-block {
      margin-top: clamp(36px, calc(44px * var(--article-font-scale)), 60px);
    }
    .article-text {
      width: 100%;
      max-width: 720px;
      font-size: calc(var(--article-body-size) * var(--article-font-scale));
      line-height: 1.48;
      letter-spacing: -0.01em;
      white-space: normal;
    }
    .article-text p + p { margin-top: 0.82em; }
    .search-highlight {
      padding: 0 0.08em;
      background: #f1d26a;
      color: #151515;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }
    .media-figure img,
    .media-figure video {
      display: block;
      width: 100%;
      height: auto;
      background: rgba(0, 0, 0, 0.08);
    }
    .media-caption {
      margin-top: 13px;
      max-width: 62ch;
      color: var(--muted);
      font-size: calc(var(--index-meta-size) * var(--index-font-scale));
      line-height: 1.45;
    }

    .gallery {
      position: relative;
      overflow: hidden;
    }
    .gallery-track {
      position: relative;
      width: 100%;
      min-height: 120px;
      overflow: hidden;
      background: color-mix(in srgb, var(--text) 5%, transparent);
      transition: height 220ms ease;
    }
    .gallery-slide {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      visibility: hidden;
      opacity: 0;
      transition: opacity 220ms ease, visibility 220ms ease;
    }
    .gallery-slide::before {
      content: "загрузка_";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 14px;
    }
    .gallery-slide.is-active {
      visibility: visible;
      opacity: 1;
    }
    .gallery-slide img,
    .gallery-slide video {
      display: block;
      width: 100%;
      height: auto;
      opacity: 0;
      transition: opacity 220ms ease;
    }
    .gallery-slide.is-loaded::before { display: none; }
    .gallery-slide.is-loaded img,
    .gallery-slide.is-loaded video { opacity: 1; }
    .gallery-slide.is-error::before { content: "не удалось загрузить"; }
    .gallery-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-top: 12px;
      color: var(--muted);
      font-size: calc(13px * var(--article-font-scale));
    }
    .gallery-actions { display: flex; gap: 16px; }
    .gallery-action {
      min-width: 34px;
      min-height: 34px;
      color: var(--muted);
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }
    .gallery-action:hover { color: var(--text); }

    .status-message {
      padding: 36px 32px;
      color: var(--muted);
      font-size: 14px;
    }
    .fallback-message {
      margin-bottom: 28px;
      color: var(--muted);
      font-size: calc(12px * var(--index-font-scale));
    }
    .search-empty {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.35;
    }

    .site-footer {
      position: fixed;
      z-index: 20;
      inset: auto 0 0;
      min-height: var(--footer-height);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 0 18px;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transform: translateY(100%);
      transition:
        opacity 260ms var(--ease),
        transform 320ms var(--ease),
        visibility 260ms ease;
    }
    .site-footer.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .footer-statement {
      font-size: clamp(22px, 2.3vw, 34px);
    }
    .footer-statement {
      width: 100%;
      color: var(--text);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.035em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .atmosphere-media {
      position: fixed;
      inset: 0;
      z-index: 4;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      opacity: 0;
      transition: opacity 650ms var(--ease);
    }
    #leaves-overlay { mix-blend-mode: multiply; }
    body.atmosphere-sun #leaves-overlay {
      opacity: 1;
      filter: sepia(22%) saturate(1.12) brightness(1.04) contrast(1.02) hue-rotate(-8deg);
    }
    body.atmosphere-night #moon-overlay { opacity: 0.6; }
    body.atmosphere-rain #rain-overlay {
      opacity: 0.55;
      mix-blend-mode: multiply;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 768px) {
      :root {
        --header-height: 72px;
        --index-meta-size: 14px;
      }
      body { overflow-y: auto; }
      .site-header {
        position: fixed;
        height: auto;
        min-height: var(--header-height);
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        grid-template-rows: auto;
        align-items: start;
        gap: 14px;
        padding: 12px 14px;
      }
      .header-logo {
        grid-column: 1;
        grid-row: 1;
        justify-self: start;
        align-self: start;
      }
      .brand-logo { width: 40px; }
      .header-actions {
        grid-column: 2;
        grid-row: 1;
        justify-self: start;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
      }
      .index-search {
        position: static;
        height: auto;
        width: 100%;
        max-width: none;
        margin-bottom: 28px;
      }
      .settings-panel { top: calc(var(--header-height) - 4px); right: 14px; }
      .settings-toolbar { gap: 8px; padding: 7px 8px; }
      .settings-chip { width: 34px; height: 34px; }
      .archive-layout {
        display: block;
        height: auto;
        min-height: 100dvh;
      }
      .article-index,
      .article-view {
        height: auto;
        overflow: visible;
      }
      .article-index {
        padding: calc(var(--header-height) + 28px) 18px 180px;
      }
      .index-item + .index-item { margin-top: 36px; }
      .index-title {
        padding-left: 28px;
      }
      .index-date { font-size: calc(var(--index-meta-size) * var(--index-font-scale)); }
      .article-view {
        display: none;
        padding: calc(var(--header-height) + 18px) 18px 180px;
      }
      body.mobile-reading .article-index { display: none; }
      body.mobile-reading .article-view { display: block; }
      .article-back { display: inline-flex; align-items: center; min-height: 44px; }
      .article-block + .article-block {
        margin-top: clamp(28px, calc(34px * var(--article-font-scale)), 44px);
      }
      .article-text {
        max-width: none;
        font-size: calc(var(--article-body-size) * var(--article-font-scale));
        line-height: 1.5;
      }
      .site-footer {
        position: fixed;
        inset: auto 0 0;
        min-height: var(--footer-height);
        padding: 14px 18px 18px;
      }
      .footer-statement {
        font-size: clamp(16px, 5vw, 21px);
      }
      .footer-statement {
        line-height: 1.08;
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-logo">
      <img class="brand-logo" src="smolensk-logo.svg" alt="Смоленск Арт" width="79" height="40">
    </div>
    <div class="header-actions">
      <a class="header-link" href="https://t.me/smolenskart" target="_blank" rel="noopener noreferrer">телеграм</a>
      <button class="header-link" id="settings-button" type="button" aria-label="Эффекты и атмосфера" aria-expanded="false" aria-controls="settings-panel">атмосфера</button>
    </div>
  </header>

  <aside class="settings-panel" id="settings-panel" hidden>
    <div class="settings-toolbar">
      <div class="settings-group settings-group--atmosphere" role="group" aria-label="Атмосфера">
        <button class="settings-chip atmosphere-option" type="button" data-atmosphere="plain" aria-pressed="true" aria-label="Обычный фон" title="Обычный фон">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.5"></circle></svg>
        </button>
        <button class="settings-chip atmosphere-option" type="button" data-atmosphere="sun" aria-pressed="false" aria-label="Солнечный день" title="Солнечный день">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.5"></circle><path d="M12 3.5v2.2M12 18.3v2.2M3.5 12h2.2M18.3 12h2.2M5.8 5.8l1.6 1.6M16.6 16.6l1.6 1.6M5.8 18.2l1.6-1.6M16.6 7.4l1.6-1.6"></path></svg>
        </button>
        <button class="settings-chip atmosphere-option" type="button" data-atmosphere="night" aria-pressed="false" aria-label="Ночь" title="Ночь">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.8 4.6a7.2 7.2 0 1 0 4.6 11.8A6.2 6.2 0 0 1 15.8 4.6z"></path></svg>
        </button>
        <button class="settings-chip atmosphere-option" type="button" data-atmosphere="rain" aria-pressed="false" aria-label="Дождь" title="Дождь">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.5 11.5a3.5 3.5 0 0 1 6.8-1.1 3.2 3.2 0 0 1 4.2 4.8H8.8a2.8 2.8 0 0 1-1.3-3.7z"></path><path d="M9 17.2v2.1M12 16.4v2.1M15 17.2v2.1"></path></svg>
        </button>
      </div>
      <div class="settings-divider" aria-hidden="true"></div>
      <div class="settings-group settings-group--paper" role="group" aria-label="Фон">
        <button class="settings-chip paper-option" type="button" data-paper="gray" aria-pressed="true" aria-label="Чёрная бумага" title="Чёрная бумага">
          <span class="paper-swatch paper-swatch--dark" aria-hidden="true"></span>
        </button>
        <button class="settings-chip paper-option" type="button" data-paper="beige" aria-pressed="false" aria-label="Тёплая бумага" title="Тёплая бумага">
          <span class="paper-swatch paper-swatch--warm" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </aside>

  <main class="archive-layout">
    <nav class="article-index" aria-label="Список статей">
      <div class="header-search index-search">
        <label class="header-search-wrap" id="article-search-wrap">
          <input class="header-search-input" id="article-search" type="text" role="searchbox" enterkeyhint="search" placeholder="поиск" autocomplete="off" aria-label="Поиск по публикациям">
          <button class="header-search-clear" id="article-search-clear" type="button" hidden aria-label="Очистить поиск">×</button>
        </label>
      </div>
      <div class="status-message" id="index-status">загрузка_</div>
      <ol class="index-list" id="index-list"></ol>
    </nav>
    <section class="article-view" id="article-view" aria-live="polite">
      <article class="article-shell" id="article-shell">
        <p class="article-empty">Выберите статью в левом столбце</p>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <p class="footer-statement">Открытое автономное исследовательско-художественное сообщество</p>
  </footer>

  <video class="atmosphere-media" id="leaves-overlay" src="leaves-wall.mp4" loop muted playsinline preload="none"></video>
  <audio id="forest-audio" src="forest.mp3" loop preload="none"></audio>
  <video class="atmosphere-media" id="moon-overlay" src="moon.mp4" loop muted playsinline preload="none"></video>
  <audio id="night-audio" src="night_normalized.mp3" loop preload="none"></audio>
  <video class="atmosphere-media" id="rain-overlay" src="rain.mp4" loop muted playsinline preload="none"></video>
  <audio id="rain-audio" src="rain_normalized.mp3" loop preload="none"></audio>

  <script src="appwrite-config.js"></script>
  <script>
    const state = { articles: [], selectedId: null, fallback: false, searchQuery: "" };
    const PAPER_KEY = "smolenskPaperBgV2";
    const ATMOSPHERE_KEY = "smolenskAtmosphereV2";

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatIndexDate(timestamp) {
      const date = new Date(timestamp);
      if (Number.isNaN(date.getTime())) return "";
      const year = String(date.getFullYear()).slice(-2);
      return `${String(date.getDate()).padStart(2, "0")}.${String(date.getMonth() + 1).padStart(2, "0")}.${year}`;
    }

    function uppercaseFirstLetter(value) {
      const source = String(value || "");
      const index = source.search(/\p{L}/u);
      if (index < 0) return source;
      return source.slice(0, index) +
        source.charAt(index).toLocaleUpperCase("ru-RU") +
        source.slice(index + 1);
    }

    function normalizeSentenceCase(value) {
      return uppercaseFirstLetter(value).replace(
        /([.!?]\s+)(["'«„(]*)(\p{Ll})/gu,
        (_, separator, punctuation, letter) =>
          separator + punctuation + letter.toLocaleUpperCase("ru-RU")
      );
    }

    function stripHashtags(value) {
      return String(value || "")
        .replace(/(^|\s)#[\p{L}\p{N}_-]+/gu, "$1")
        .replace(/[ \t]+$/gm, "")
        .trim();
    }

    function normalizedSearchText(value) {
      return stripHashtags(value).replace(/\s+/g, " ").toLocaleLowerCase("ru-RU");
    }

    function articleBodySearchText(article) {
      return article.blocks.flatMap(block => [
        block.text || "",
        block.caption || "",
        block.alt || "",
        ...(block.media || []).flatMap(item => [item.alt || "", item.name || ""]),
      ]).join(" ");
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightHtml(value) {
      const source = String(value || "");
      const query = state.searchQuery.trim();
      if (!query) return escapeHtml(source);
      const pattern = new RegExp(escapeRegExp(query), "giu");
      let html = "";
      let lastIndex = 0;
      for (const match of source.matchAll(pattern)) {
        html += escapeHtml(source.slice(lastIndex, match.index));
        html += `<mark class="search-highlight">${escapeHtml(match[0])}</mark>`;
        lastIndex = match.index + match[0].length;
      }
      return html + escapeHtml(source.slice(lastIndex));
    }

    function deriveTitle(item) {
      const raw = item.title || item.caption || item.captionHtml || item.text || item.message || "Без названия";
      const plain = stripHashtags(String(raw).replace(/<[^>]+>/g, " ")).replace(/\s+/g, " ").trim();
      const prepared = plain || "Без названия";
      const shortened = prepared.length > 110 ? `${prepared.slice(0, 107)}...` : prepared;
      return uppercaseFirstLetter(shortened);
    }

    function compareArticles(a, b) {
      if (Boolean(a.featured) !== Boolean(b.featured)) return a.featured ? -1 : 1;
      return b.timestamp - a.timestamp;
    }

    function parseStoredBlocks(post, mediaByFile) {
      if (!post.blocksJson) return [];
      try {
        const parsed = JSON.parse(post.blocksJson);
        if (!Array.isArray(parsed)) return [];
        return parsed.flatMap(block => {
          if (!block || typeof block !== "object" || typeof block.type !== "string") return [];
          if (block.type === "text") {
            return block.text ? [{ type: "text", text: String(block.text) }] : [];
          }
          const media = Array.isArray(block.fileIds)
            ? block.fileIds.map(fileId => mediaByFile.get(fileId)).filter(Boolean)
            : [];
          if (!media.length) return [];
          return [{
            type: block.type,
            caption: String(block.caption || ""),
            alt: String(block.alt || ""),
            media,
          }];
        });
      } catch {
        return [];
      }
    }

    function legacyBlocks(post, attached) {
      const blocks = [];
      if (post.type !== "text" && attached.length) {
        blocks.push({
          type: post.type,
          caption: post.caption || "",
          alt: attached[0]?.alt || "",
          media: attached,
        });
      }
      if (post.text) blocks.push({ type: "text", text: post.text });
      return blocks;
    }

    async function fetchAppwriteRows(tableId) {
      const config = window.SMOLENSK_APPWRITE_CONFIG;
      if (!config?.endpoint || !config?.projectId) throw new Error("Appwrite не настроен");
      const endpoint = config.endpoint.replace(/\/$/, "");
      const query = encodeURIComponent('{"method":"limit","values":[500]}');
      const url = `${endpoint}/tablesdb/${encodeURIComponent(config.databaseId)}/tables/${encodeURIComponent(tableId)}/rows?queries[]=${query}`;
      const response = await fetch(url, {
        headers: { "X-Appwrite-Project": config.projectId },
      });
      if (!response.ok) throw new Error(`Appwrite: ${response.status}`);
      const payload = await response.json();
      return payload.rows || [];
    }

    async function loadAppwriteArticles() {
      const config = window.SMOLENSK_APPWRITE_CONFIG;
      const [posts, media] = await Promise.all([
        fetchAppwriteRows(config.postsTableId),
        fetchAppwriteRows(config.mediaTableId),
      ]);
      const mediaByPost = new Map();
      const mediaByFile = new Map();
      media.forEach(item => {
        mediaByFile.set(item.fileId, item);
        const current = mediaByPost.get(item.postId) || [];
        current.push(item);
        mediaByPost.set(item.postId, current);
      });
      mediaByPost.forEach(items => items.sort((a, b) => a.position - b.position));

      return posts.map(post => {
        const attached = mediaByPost.get(post.$id) || [];
        const storedBlocks = parseStoredBlocks(post, mediaByFile);
        const timestamp = Date.parse(post.publishedAt || post.$createdAt);
        return {
          id: post.$id,
          title: deriveTitle(post),
          timestamp: Number.isNaN(timestamp) ? Date.now() : timestamp,
          featured: Boolean(post.featured),
          blocks: storedBlocks.length ? storedBlocks : legacyBlocks(post, attached),
        };
      }).sort(compareArticles);
    }

    function legacyItemToArticle(item) {
      const media = [];
      if (Array.isArray(item.images)) {
        item.images.forEach(image => media.push({
          url: image.url,
          alt: image.alt || item.caption || "",
          mimeType: "image/webp",
        }));
      } else if (item.url) {
        media.push({
          url: item.url,
          alt: item.alt || item.caption || "",
          mimeType: item.type === "video" ? "video/mp4" : item.type === "gif" ? "image/gif" : "image/webp",
        });
      }
      const blocks = [];
      if (media.length) {
        blocks.push({
          type: item.type === "gallery" ? "gallery" : item.type === "video" ? "video" : item.type === "gif" ? "animation" : "image",
          caption: item.caption || "",
          alt: item.alt || item.caption || "",
          media,
        });
      }
      const text = item.text || item.message || item.bodyHtml || item.html || "";
      if (text) blocks.push({ type: "text", text: String(text).replace(/<[^>]+>/g, " ") });
      return {
        id: String(item.id || crypto.randomUUID()),
        title: deriveTitle(item),
        timestamp: Number(item.ts) || Date.now(),
        featured: Boolean(item.featured),
        blocks,
      };
    }

    async function loadArticles() {
      try {
        return { articles: await loadAppwriteArticles(), fallback: false };
      } catch (onlineError) {
        const response = await fetch("content.json");
        if (!response.ok) throw onlineError;
        const payload = await response.json();
        const all = [...(payload.thoughts || []), ...(payload.messages || []), ...(payload.images || [])];
        return { articles: all.map(legacyItemToArticle).sort(compareArticles), fallback: true };
      }
    }

    function renderIndex() {
      const list = document.getElementById("index-list");
      const status = document.getElementById("index-status");
      const query = normalizedSearchText(state.searchQuery);
      const articles = query
        ? state.articles
            .map((article, index) => {
              const titleMatch = normalizedSearchText(article.title).includes(query);
              const bodyMatch = normalizedSearchText(articleBodySearchText(article)).includes(query);
              return { article, index, score: titleMatch ? 2 : bodyMatch ? 1 : 0 };
            })
            .filter(result => result.score > 0)
            .sort((a, b) => b.score - a.score || a.index - b.index)
            .map(result => result.article)
        : state.articles;
      status.hidden = true;
      list.innerHTML = "";
      if (state.fallback) {
        const notice = document.createElement("li");
        notice.className = "fallback-message";
        notice.textContent = "Онлайн-лента временно недоступна. Показана сохранённая копия.";
        list.appendChild(notice);
      }
      if (!articles.length) {
        const empty = document.createElement("li");
        empty.className = "search-empty";
        empty.textContent = query ? "Ничего не найдено" : "Публикаций пока нет";
        list.appendChild(empty);
      }
      articles.forEach(article => {
        const item = document.createElement("li");
        item.className = "index-item";
        item.innerHTML =
          `<button class="index-button" type="button" data-article-id="${escapeHtml(article.id)}" aria-current="false">` +
            `<time class="index-date">${escapeHtml(formatIndexDate(article.timestamp))}</time>` +
            `<span class="index-title">${escapeHtml(article.title)}</span>` +
          `</button>`;
        list.appendChild(item);
      });
      list.querySelectorAll(".index-button").forEach(button => {
        button.addEventListener("click", () => selectArticle(button.dataset.articleId, true));
      });
    }

    function paragraphHtml(text) {
      return stripHashtags(text)
        .split(/\n+/)
        .filter(Boolean)
        .map(paragraph => `<p>${highlightHtml(normalizeSentenceCase(paragraph.trim()))}</p>`)
        .join("");
    }

    function mediaHtml(item, alt, eager) {
      const source = escapeHtml(item.url || "");
      const safeAlt = escapeHtml(item.alt || alt || "");
      if (String(item.mimeType || "").startsWith("video/")) {
        return `<video src="${source}" controls playsinline preload="metadata" aria-label="${safeAlt}"></video>`;
      }
      return `<img src="${source}" alt="${safeAlt}" loading="${eager ? "eager" : "lazy"}">`;
    }

    function renderBlock(block, index) {
      if (block.type === "text") {
        return `<section class="article-block article-text">${paragraphHtml(block.text)}</section>`;
      }
      const media = block.media || [];
      if (!media.length) return "";
      const cleanCaption = stripHashtags(block.caption);
      const caption = cleanCaption
        ? `<figcaption class="media-caption">${highlightHtml(cleanCaption)}</figcaption>`
        : "";
      if (block.type === "gallery" && media.length > 1) {
        const slides = media.map((item, slideIndex) =>
          `<div class="gallery-slide${slideIndex === 0 ? " is-active" : ""}">${mediaHtml(item, block.alt, index === 0 && slideIndex === 0)}</div>`
        ).join("");
        return (
          `<figure class="article-block media-figure gallery" data-gallery>` +
            `<div class="gallery-track">${slides}</div>` +
            `<div class="gallery-controls">` +
              `<span class="gallery-count" aria-live="polite">1 / ${media.length}</span>` +
              `<div class="gallery-actions">` +
                `<button class="gallery-action gallery-prev" type="button" aria-label="Предыдущее фото">←</button>` +
                `<button class="gallery-action gallery-next" type="button" aria-label="Следующее фото">→</button>` +
              `</div>` +
            `</div>${caption}` +
          `</figure>`
        );
      }
      return (
        `<figure class="article-block media-figure">` +
          mediaHtml(media[0], block.alt, index === 0) +
          caption +
        `</figure>`
      );
    }

    function initGalleries(scope) {
      scope.querySelectorAll("[data-gallery]").forEach(gallery => {
        const track = gallery.querySelector(".gallery-track");
        const slides = Array.from(gallery.querySelectorAll(".gallery-slide"));
        const count = gallery.querySelector(".gallery-count");
        let active = 0;

        const syncTrackHeight = () => {
          if (!track) return;
          const slide = slides[active];
          const media = slide?.querySelector("img, video");
          if (!media) {
            track.style.height = "";
            track.style.minHeight = "120px";
            return;
          }
          const setHeight = () => {
            const width = media.naturalWidth || media.videoWidth || 0;
            const height = media.naturalHeight || media.videoHeight || 0;
            if (!width || !height) return;
            const trackWidth = track.getBoundingClientRect().width;
            if (!trackWidth) return;
            track.style.minHeight = "0";
            track.style.height = `${(trackWidth * height) / width}px`;
          };
          if (media instanceof HTMLImageElement) {
            if (media.complete && media.naturalWidth > 0) setHeight();
            else media.addEventListener("load", setHeight, { once: true });
          } else if (media.readyState >= HTMLMediaElement.HAVE_METADATA) {
            setHeight();
          } else {
            media.addEventListener("loadedmetadata", setHeight, { once: true });
          }
        };

        slides.forEach(slide => {
          const media = slide.querySelector("img, video");
          if (!media) {
            slide.classList.add("is-error");
            return;
          }
          const markLoaded = () => {
            slide.classList.add("is-loaded");
            if (slide.classList.contains("is-active")) syncTrackHeight();
          };
          const markError = () => slide.classList.add("is-error");
          if (media instanceof HTMLImageElement) {
            media.loading = "eager";
            if (media.complete && media.naturalWidth > 0) {
              markLoaded();
            } else {
              media.addEventListener("load", markLoaded, { once: true });
              media.addEventListener("error", markError, { once: true });
            }
          } else if (media.readyState >= HTMLMediaElement.HAVE_METADATA) {
            markLoaded();
          } else {
            media.preload = "metadata";
            media.addEventListener("loadedmetadata", markLoaded, { once: true });
            media.addEventListener("error", markError, { once: true });
          }
        });

        const show = next => {
          active = (next + slides.length) % slides.length;
          slides.forEach((slide, index) => slide.classList.toggle("is-active", index === active));
          count.textContent = `${active + 1} / ${slides.length}`;
          syncTrackHeight();
        };

        if (typeof ResizeObserver !== "undefined" && track) {
          const observer = new ResizeObserver(() => syncTrackHeight());
          observer.observe(track);
        } else {
          window.addEventListener("resize", syncTrackHeight);
        }

        syncTrackHeight();
        gallery.querySelector(".gallery-prev").addEventListener("click", () => show(active - 1));
        gallery.querySelector(".gallery-next").addEventListener("click", () => show(active + 1));
      });
    }

    function selectArticle(articleId, updateHash) {
      const article = state.articles.find(item => item.id === articleId);
      if (!article) return;
      state.selectedId = article.id;
      document.querySelectorAll(".index-button").forEach(button => {
        button.setAttribute("aria-current", button.dataset.articleId === article.id ? "true" : "false");
      });
      const shell = document.getElementById("article-shell");
      shell.classList.add("is-changing");
      window.setTimeout(() => {
        const blocks = article.blocks.map(renderBlock).join("");
        shell.innerHTML =
          `<button class="article-back" id="article-back" type="button">← К списку статей</button>` +
          `<div class="article-content">${blocks || '<p class="article-text">Материал готовится.</p>'}</div>`;
        shell.classList.remove("is-changing");
        initGalleries(shell);
        document.getElementById("article-back").addEventListener("click", closeMobileArticle);
        const articleView = document.getElementById("article-view");
        articleView.scrollTop = 0;
        syncFooterVisibility();
        if (window.matchMedia("(max-width: 768px)").matches) {
          document.body.classList.add("mobile-reading");
          window.scrollTo({ top: 0, behavior: "instant" });
        }
        const firstMatch = shell.querySelector(".search-highlight");
        if (firstMatch) {
          const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          window.requestAnimationFrame(() => {
            if (window.matchMedia("(max-width: 768px)").matches) {
              firstMatch.scrollIntoView({ behavior: reduceMotion ? "auto" : "smooth", block: "center" });
              return;
            }
            const targetTop =
              firstMatch.getBoundingClientRect().top -
              articleView.getBoundingClientRect().top +
              articleView.scrollTop;
            articleView.scrollTo({
              top: Math.max(0, targetTop - articleView.clientHeight * 0.25),
              behavior: reduceMotion ? "auto" : "smooth",
            });
          });
        }
        window.requestAnimationFrame(syncFooterVisibility);
      }, 120);
      if (updateHash) history.replaceState(null, "", `#article=${encodeURIComponent(article.id)}`);
    }

    function closeMobileArticle() {
      document.body.classList.remove("mobile-reading");
      history.replaceState(null, "", location.pathname + location.search);
      const selected = document.querySelector('.index-button[aria-current="true"]');
      selected?.focus({ preventScroll: true });
      window.scrollTo({ top: 0, behavior: "instant" });
      syncFooterVisibility();
    }

    function articleIdFromHash() {
      const match = location.hash.match(/^#article=(.+)$/);
      return match ? decodeURIComponent(match[1]) : null;
    }

    function stopAtmosphereMedia() {
      ["leaves-overlay", "moon-overlay", "rain-overlay", "forest-audio", "night-audio", "rain-audio"].forEach(id => {
        const media = document.getElementById(id);
        media.pause();
        media.currentTime = 0;
      });
    }

    function syncSunAvailability(paperMode) {
      const sunOption = document.querySelector('.atmosphere-option[data-atmosphere="sun"]');
      if (!sunOption) return;
      const hide = paperMode === "gray";
      sunOption.hidden = hide;
      sunOption.classList.toggle("is-unavailable", hide);
    }

    function setAtmosphere(mode, fromUser) {
      stopAtmosphereMedia();
      document.body.classList.remove("theme-dark", "theme-rain", "atmosphere-sun", "atmosphere-night", "atmosphere-rain");
      if (mode === "sun") {
        document.body.classList.add("atmosphere-sun");
        if (fromUser) {
          document.getElementById("leaves-overlay").play().catch(() => {});
          document.getElementById("forest-audio").play().catch(() => {});
        }
      } else if (mode === "night") {
        document.body.classList.add("theme-dark", "atmosphere-night");
        if (fromUser) {
          document.getElementById("moon-overlay").play().catch(() => {});
          document.getElementById("night-audio").play().catch(() => {});
        }
      } else if (mode === "rain") {
        document.body.classList.add("theme-rain", "atmosphere-rain");
        if (fromUser) {
          document.getElementById("rain-overlay").play().catch(() => {});
          document.getElementById("rain-audio").play().catch(() => {});
        }
      }
      document.querySelectorAll(".atmosphere-option").forEach(button => {
        button.setAttribute("aria-pressed", button.dataset.atmosphere === mode ? "true" : "false");
      });
      localStorage.setItem(ATMOSPHERE_KEY, mode);
    }

    function setPaper(mode) {
      document.body.classList.toggle("paper-beige", mode === "beige");
      document.querySelectorAll(".paper-option").forEach(button => {
        button.setAttribute("aria-pressed", button.dataset.paper === mode ? "true" : "false");
      });
      localStorage.setItem(PAPER_KEY, mode);
      syncSunAvailability(mode);
      if (mode === "gray" && localStorage.getItem(ATMOSPHERE_KEY) === "sun") {
        setAtmosphere("plain", false);
      }
    }

    function initSettings() {
      const button = document.getElementById("settings-button");
      const panel = document.getElementById("settings-panel");
      const close = () => {
        panel.hidden = true;
        button.setAttribute("aria-expanded", "false");
      };
      button.addEventListener("click", event => {
        event.stopPropagation();
        panel.hidden = !panel.hidden;
        button.setAttribute("aria-expanded", panel.hidden ? "false" : "true");
      });
      panel.addEventListener("click", event => event.stopPropagation());
      document.addEventListener("click", close);
      document.addEventListener("keydown", event => {
        if (event.key === "Escape") {
          close();
          button.focus();
        }
      });
      document.querySelectorAll(".atmosphere-option").forEach(option => {
        option.addEventListener("click", () => setAtmosphere(option.dataset.atmosphere, true));
      });
      document.querySelectorAll(".paper-option").forEach(option => {
        option.addEventListener("click", () => setPaper(option.dataset.paper));
      });
      setPaper(localStorage.getItem(PAPER_KEY) === "beige" ? "beige" : "gray");
      const paperMode = localStorage.getItem(PAPER_KEY) === "beige" ? "beige" : "gray";
      let savedAtmosphere = localStorage.getItem(ATMOSPHERE_KEY);
      if (!["plain", "sun", "night", "rain"].includes(savedAtmosphere)) savedAtmosphere = "plain";
      if (paperMode === "gray" && savedAtmosphere === "sun") savedAtmosphere = "plain";
      setAtmosphere(savedAtmosphere, false);
    }

    function initSearch() {
      const wrap = document.getElementById("article-search-wrap");
      const input = document.getElementById("article-search");
      const clear = document.getElementById("article-search-clear");

      const syncClear = () => {
        const hasValue = Boolean(input.value);
        clear.hidden = !hasValue;
        wrap.classList.toggle("has-value", hasValue);
      };

      input.addEventListener("input", () => {
        state.searchQuery = input.value;
        renderIndex();
        syncClear();
      });

      clear.addEventListener("click", () => {
        input.value = "";
        state.searchQuery = "";
        renderIndex();
        syncClear();
        input.focus();
      });

      syncClear();
    }

    function isMobileReading() {
      return window.matchMedia("(max-width: 768px)").matches &&
        document.body.classList.contains("mobile-reading");
    }

    function syncFooterVisibility() {
      const footer = document.querySelector(".site-footer");
      const articleView = document.getElementById("article-view");
      const content = document.querySelector(".article-content");
      const threshold = 32;
      let atBottom = false;

      if (!state.selectedId || !content) {
        atBottom = false;
      } else if (isMobileReading()) {
        atBottom = content.getBoundingClientRect().bottom <= window.innerHeight + threshold;
      } else {
        atBottom =
          content.getBoundingClientRect().bottom <=
          articleView.getBoundingClientRect().bottom + threshold;
      }

      footer.classList.toggle("is-visible", atBottom);
    }

    function initFooterReveal() {
      const articleView = document.getElementById("article-view");
      const shell = document.getElementById("article-shell");
      const sync = () => syncFooterVisibility();

      articleView.addEventListener("scroll", sync, { passive: true });
      window.addEventListener("scroll", sync, { passive: true });
      window.addEventListener("resize", sync);

      if (typeof ResizeObserver !== "undefined") {
        const observer = new ResizeObserver(sync);
        observer.observe(shell);
        observer.observe(articleView);
      }

      sync();
    }

    initSettings();
    initSearch();
    initFooterReveal();
    loadArticles()
      .then(({ articles, fallback }) => {
        state.articles = articles;
        state.fallback = fallback;
        renderIndex();
        if (!articles.length) {
          document.getElementById("article-shell").innerHTML = '<p class="article-empty">Публикаций пока нет</p>';
          return;
        }
        const requested = articleIdFromHash();
        const initial = articles.find(article => article.id === requested) || articles[0];
        selectArticle(initial.id, false);
      })
      .catch(() => {
        document.getElementById("index-status").textContent = "не удалось загрузить публикации";
        document.getElementById("article-shell").innerHTML = '<p class="article-empty">Не удалось загрузить публикации</p>';
      });
  </script>
</body>
</html>
